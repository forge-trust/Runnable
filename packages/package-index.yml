packages:
  - project: ForgeTrust.Runnable.Core/ForgeTrust.Runnable.Core.csproj
    classification: public
    order: 10
    use_when: Install this directly only when you are authoring reusable Runnable modules or host integrations instead of starting from a web, console, or Aspire package.
    includes: Core module abstractions, dependency graph orchestration, RunnableStartup, and StartupContext.
    does_not_include: ASP.NET Core hosting, CliFx command hosting, Aspire app-model helpers, or optional integrations.
    start_here_path: ForgeTrust.Runnable.Core/README.md
  - project: Config/ForgeTrust.Runnable.Config/ForgeTrust.Runnable.Config.csproj
    classification: public
    order: 20
    use_when: Add this when your Runnable modules need strongly typed configuration primitives instead of ad hoc configuration lookups.
    includes: RunnableConfigModule, typed config objects, configuration providers, and explicit configuration access patterns.
    does_not_include: Web hosting, UI docs, caching, or a separate secret-management system.
    start_here_path: Config/ForgeTrust.Runnable.Config/README.md
  - project: Caching/ForgeTrust.Runnable.Caching/ForgeTrust.Runnable.Caching.csproj
    classification: public
    order: 30
    use_when: Add this when your modules need lightweight in-process memoization and cache policy primitives.
    includes: RunnableCachingModule, IMemo or Memo helpers, and cache policy primitives on top of Microsoft.Extensions.Caching.Memory.
    does_not_include: Distributed caching infrastructure, web hosting, or configuration binding.
    start_here_path: Caching/ForgeTrust.Runnable.Caching/README.md
  - project: Console/ForgeTrust.Runnable.Console/ForgeTrust.Runnable.Console.csproj
    classification: public
    order: 40
    use_when: Start here for CLI apps and worker-style entry points that should run through the Runnable startup pipeline with CliFx.
    includes: ConsoleStartup, ConsoleApp, hosted command execution, and CliFx command discovery through Runnable modules.
    does_not_include: ASP.NET Core hosting, OpenAPI surfaces, or Razor-based UI composition.
    start_here_path: Console/ForgeTrust.Runnable.Console/README.md
    recipe_summary: Start with `ForgeTrust.Runnable.Console` for CLI commands or worker-style processes that should share Runnable module composition.
  - project: Dependency/ForgeTrust.Runnable.Dependency.Autofac/ForgeTrust.Runnable.Dependency.Autofac.csproj
    classification: public
    order: 50
    use_when: Add this when you need Autofac-specific registrations or container features instead of the default .NET service collection.
    includes: RunnableAutofacModule and Autofac-aware service registration hooks for Runnable modules.
    does_not_include: The default Microsoft DI container, web hosting, or command hosting by itself.
    start_here_path: Dependency/ForgeTrust.Runnable.Dependency.Autofac/README.md
    recipe_summary: Add `ForgeTrust.Runnable.Dependency.Autofac` when your app already uses Autofac and your modules need Autofac-specific registrations.
    depends_on:
      - ForgeTrust.Runnable.Core
  - project: Aspire/ForgeTrust.Runnable.Aspire/ForgeTrust.Runnable.Aspire.csproj
    classification: public
    order: 60
    use_when: Start here for .NET Aspire app-model projects that want Runnable-style modular composition for service defaults and distributed resources.
    includes: AspireApp entry points and modular registration for distributed application resources and service defaults.
    does_not_include: ASP.NET Core web hosting, Razor UI features, or the standalone docs host.
    start_here_path: Aspire/ForgeTrust.Runnable.Aspire/README.md
    recipe_summary: Start with `ForgeTrust.Runnable.Aspire` for distributed app-model projects and service-default composition.
  - project: Web/ForgeTrust.Runnable.Web/ForgeTrust.Runnable.Web.csproj
    classification: public
    order: 70
    use_when: Install this first for a normal ASP.NET Core app with Runnable modules when you want the base web startup pipeline before layering on optional UI or docs packages.
    includes: Base ASP.NET Core hosting, middleware and endpoint composition, and the core Runnable web module contract.
    does_not_include: OpenAPI generation, Scalar UI, RazorWire reactive UI, Tailwind build integration, or the RazorDocs host.
    start_here_path: Web/ForgeTrust.Runnable.Web/README.md
    recipe_summary: Add `ForgeTrust.Runnable.Web.OpenApi` after `ForgeTrust.Runnable.Web` when you want generated OpenAPI endpoints.
  - project: Web/ForgeTrust.Runnable.Web.OpenApi/ForgeTrust.Runnable.Web.OpenApi.csproj
    classification: public
    order: 80
    use_when: Add this after the base web package when you want generated OpenAPI endpoints for a Runnable web app.
    includes: AddOpenApi wiring, endpoint explorer setup, endpoint mapping, and default OpenAPI document transforms.
    does_not_include: A hosted API reference UI or reactive Razor components.
    start_here_path: Web/ForgeTrust.Runnable.Web.OpenApi/README.md
    recipe_summary: Add `ForgeTrust.Runnable.Web.Scalar` after `ForgeTrust.Runnable.Web.OpenApi` when you want a hosted API reference UI.
    depends_on:
      - ForgeTrust.Runnable.Web
  - project: Web/ForgeTrust.Runnable.Web.Scalar/ForgeTrust.Runnable.Web.Scalar.csproj
    classification: public
    order: 90
    use_when: Add this after OpenAPI when you want Scalar's interactive API reference UI served by your Runnable web app.
    includes: Scalar UI endpoint mapping and the OpenAPI module dependency needed to feed it.
    does_not_include: OpenAPI authoring by itself without the base web host, or reactive Razor component streaming.
    start_here_path: Web/ForgeTrust.Runnable.Web.Scalar/README.md
    depends_on:
      - ForgeTrust.Runnable.Web.OpenApi
  - project: Web/ForgeTrust.Runnable.Web.RazorWire/ForgeTrust.Runnable.Web.RazorWire.csproj
    classification: public
    order: 100
    use_when: Add this when you want reactive Razor fragments, Turbo-style page updates, server-sent streams, or islands without moving to a separate frontend app.
    includes: RazorWire modules, TagHelpers, stream helpers, Razor fragment updates, and hybrid island support.
    does_not_include: OpenAPI generation, API reference UI, or Tailwind asset compilation.
    start_here_path: Web/ForgeTrust.Runnable.Web.RazorWire/README.md
    recipe_summary: Add `ForgeTrust.Runnable.Web.RazorWire` when you want reactive Razor UI, Turbo-style streams, and server-rendered islands.
    depends_on:
      - ForgeTrust.Runnable.Web
  - project: Web/ForgeTrust.Runnable.Web.Tailwind/ForgeTrust.Runnable.Web.Tailwind.csproj
    classification: public
    order: 110
    use_when: Add this when you want Tailwind build and watch integration in a Runnable web app without carrying a Node.js asset pipeline.
    includes: Tailwind standalone CLI integration, watch mode, generated CSS output, and transitive runtime package selection for supported build hosts.
    does_not_include: JavaScript plugin ecosystems that require npm-first tooling, or direct runtime-package selection.
    start_here_path: Web/ForgeTrust.Runnable.Web.Tailwind/README.md
    recipe_summary: Add `ForgeTrust.Runnable.Web.Tailwind` when you want Tailwind without a separate Node.js asset pipeline.
    depends_on:
      - ForgeTrust.Runnable.Web
  - project: Web/ForgeTrust.Runnable.Web.RazorDocs/ForgeTrust.Runnable.Web.RazorDocs.csproj
    classification: proof_host
    order: 200
    note: Reusable docs package for harvesting repository docs into a RazorDocs UI. This is a real package, but it is a proof-host surface rather than the default first install for general Runnable apps.
    start_here_path: Web/ForgeTrust.Runnable.Web.RazorDocs/README.md
    start_here_label: RazorDocs README
  - project: Web/ForgeTrust.Runnable.Web.RazorDocs.Standalone/ForgeTrust.Runnable.Web.RazorDocs.Standalone.csproj
    classification: proof_host
    order: 210
    note: Thin runnable host for serving or exporting RazorDocs. Treat it as a proof host and example app, not a package you install into another project.
    start_here_path: Web/ForgeTrust.Runnable.Web.RazorDocs.Standalone/README.md
    start_here_label: Standalone host README
  - project: Web/ForgeTrust.Runnable.Web.Tailwind/runtimes/ForgeTrust.Runnable.Web.Tailwind.Runtime.linux-arm64.csproj
    classification: support
    order: 300
    note: Tailwind standalone runtime for Linux Arm64 build hosts. Restore it transitively through `ForgeTrust.Runnable.Web.Tailwind` instead of installing it directly.
  - project: Web/ForgeTrust.Runnable.Web.Tailwind/runtimes/ForgeTrust.Runnable.Web.Tailwind.Runtime.linux-x64.csproj
    classification: support
    order: 310
    note: Tailwind standalone runtime for Linux x64 build hosts. Restore it transitively through `ForgeTrust.Runnable.Web.Tailwind` instead of installing it directly.
  - project: Web/ForgeTrust.Runnable.Web.Tailwind/runtimes/ForgeTrust.Runnable.Web.Tailwind.Runtime.osx-arm64.csproj
    classification: support
    order: 320
    note: Tailwind standalone runtime for macOS Arm64 build hosts. Restore it transitively through `ForgeTrust.Runnable.Web.Tailwind` instead of installing it directly.
  - project: Web/ForgeTrust.Runnable.Web.Tailwind/runtimes/ForgeTrust.Runnable.Web.Tailwind.Runtime.osx-x64.csproj
    classification: support
    order: 330
    note: Tailwind standalone runtime for macOS x64 build hosts. Restore it transitively through `ForgeTrust.Runnable.Web.Tailwind` instead of installing it directly.
  - project: Web/ForgeTrust.Runnable.Web.Tailwind/runtimes/ForgeTrust.Runnable.Web.Tailwind.Runtime.win-x64.csproj
    classification: support
    order: 340
    note: Tailwind standalone runtime for Windows x64 build hosts. Restore it transitively through `ForgeTrust.Runnable.Web.Tailwind` instead of installing it directly.
  - project: Web/ForgeTrust.Runnable.Web.RazorWire.Cli/ForgeTrust.Runnable.Web.RazorWire.Cli.csproj
    classification: excluded
    order: 400
    note: "Held out of the direct-install chooser until issue #171 lands real .NET tool packaging and stable install guidance."
